services:
  ips:
    build:
      context: .
      dockerfile: docker/ips/Dockerfile
    container_name: ms_ips
    hostname: ips
    restart: always
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
    volumes:
      - ./:/workspace
      - ./logs:/var/log/minisnort
      - /etc/localtime:/etc/localtime:ro
    networks:
      lab_net:
        ipv4_address: 10.100.0.2
    command: /workspace/scripts/ips_entrypoint.sh
    tty: true

  attacker:
    build: ./docker/attacker
    container_name: ms_attacker
    hostname: attacker
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./scripts:/scripts:ro
      - ./logs/attacker:/var/log/attacker
      - /etc/localtime:/etc/localtime:ro
    networks:
      lab_net:
        ipv4_address: 10.100.0.10
    depends_on:
      - ips
    command: /scripts/attacker_entrypoint.sh
    tty: true

  victim:
    build: ./docker/victim
    container_name: ms_victim
    hostname: victim
    cap_add:
      - NET_ADMIN
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      lab_net:
        ipv4_address: 10.100.0.20
    depends_on:
      - ips
    ports: []
    tty: true

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: ms_dashboard
    hostname: dashboard
    working_dir: /app
    environment:
      MINISNORT_RULES: /workspace/config/rules/local.rules
      MINISNORT_RULES_ROOT: /workspace/config/rules
      MINISNORT_ALERTS: /var/log/minisnort/alert.log
      DASHBOARD_TOKEN_FILE: /tmp/minisnort-dashboard-token
    volumes:
      - ./dashboard:/app:ro
      - ./config/rules:/workspace/config/rules
      - ./logs:/var/log/minisnort
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - ips
    command: python /app/server.py --host 0.0.0.0 --port 8080
    tty: true

networks:
  lab_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.100.0.0/24
          gateway: 10.100.0.1
